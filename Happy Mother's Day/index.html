<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mother's Day Envelope</title>

    <style>
        :root {
            --bg-color: #aeb6e3;
            --env-main: #203268;
            --env-lid: #17133f;
            --letter-white: #ffffff;

            --env-width: 500px;
            --env-height: 300px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background: var(--bg-color);
            position: relative;
            font-family: Arial, sans-serif;
        }

        /* FLOWER BACKGROUND */
        #flower-garden {
            position: absolute;
            inset: 0;
            overflow: hidden;
            z-index: 0;
        }

        .bg-flower {
            position: absolute;
            user-select: none;
            pointer-events: none;
            opacity: 0.75;
            animation: floaty linear infinite;
            filter: drop-shadow(0 0 6px rgba(255,255,255,0.4));
        }

        @keyframes floaty {
            0% {
                transform: translateY(0px) rotate(0deg);
            }

            50% {
                transform: translateY(-25px) rotate(15deg);
            }

            100% {
                transform: translateY(0px) rotate(0deg);
            }
        }

        /* ENVELOPE */
        .container {
            position: relative;
            width: var(--env-width);
            height: var(--env-height);
            cursor: pointer;
            z-index: 10;
        }

        /* LID */
        .lid {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;

            border-left: 250px solid transparent;
            border-right: 250px solid transparent;
            border-top: 160px solid var(--env-lid);

            transform-origin: top;
            transition: 0.6s ease;
            z-index: 5;
        }

        /* LETTER */
        .letter {
            position: absolute;
            left: 15px;
            top: 25px;

            width: 470px;
            height: 270px;

            background: white;
            padding: 35px;

            text-align: center;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            box-shadow: 0 10px 25px rgba(0,0,0,0.2);

            transition: 0.7s ease;

            z-index: 1;
        }

       .letter h1 {
    color: #14245e;
    margin-bottom: 18px;

    /* CHANGED THESE */
    font-size: 1.8rem;
    white-space: nowrap;

    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

        .letter p {
            color: #6b1230;
            font-size: 1.25rem;
            line-height: 1.6;
        }

        .heart {
            margin-top: 18px;
            font-size: 2.2rem;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.25); }
            100% { transform: scale(1); }
        }

        /* ENVELOPE BODY */
        .front-panel {
            position: absolute;
            bottom: 0;
            left: 0;

            width: 100%;
            height: 100%;

            background: var(--env-main);

            z-index: 3;
        }

        /* OPEN STATE */
        .container.open .lid {
            transform: rotateX(180deg);
            z-index: 0;
        }

        .container.open .letter {
            transform: translateY(-220px);
            z-index: 10;
        }

    </style>
</head>

<body>

    <!-- FLOWERS -->
    <div id="flower-garden"></div>

    <!-- ENVELOPE -->
    <div class="container" onclick="this.classList.toggle('open')">

        <div class="lid"></div>

        <div class="letter">
            <h1>🌸 Happy Mother's Day! 🌸</h1>

            <p>
                Thank you for your endless love, care,
                and kindness. You make the world
                brighter every single day!
            </p>

            <div class="heart">❤️</div>
        </div>

        <div class="front-panel"></div>
    </div>

    <script>
        const garden = document.getElementById("flower-garden");

        /* MORE FLOWERS */
        const flowers = [
            "🌸","🌺","🌷","🌼","💐",
            "🪻","🌹","🌻","🌷","🌸"
        ];

        /* INCREASE THIS FOR SUPER DENSE FLOWERS */
        const flowerCount = 140;

        for (let i = 0; i < flowerCount; i++) {

            const flower = document.createElement("div");

            flower.className = "bg-flower";

            flower.innerText =
                flowers[Math.floor(Math.random() * flowers.length)];

            /* RANDOM POSITION */
            flower.style.left = Math.random() * 100 + "vw";
            flower.style.top = Math.random() * 100 + "vh";

            /* RANDOM SIZE */
            flower.style.fontSize =
                (Math.random() * 2.5 + 0.8) + "rem";

            /* RANDOM ANIMATION SPEED */
            flower.style.animationDuration =
                (Math.random() * 8 + 4) + "s";

            flower.style.animationDelay =
                (Math.random() * 5) + "s";

            /* RANDOM ROTATION */
            flower.style.transform =
                `rotate(${Math.random() * 360}deg)`;

            garden.appendChild(flower);
        }
    </script>

</body>
</html>

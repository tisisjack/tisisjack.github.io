<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mother's Day Envelope</title>

    <style>
        :root {
            --bg-color: #aeb6e3;
            --env-main: #203268;
            --env-lid: #17133f;
            
            /* Responsive sizing */
            --env-width: 90vw;
            --env-max-width: 500px;
            --env-height: 300px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background: var(--bg-color);
            margin: 0;
            position: relative;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* FLOWER BACKGROUND */
        #flower-garden {
            position: absolute;
            inset: 0;
            overflow: hidden;
            z-index: 0;
        }

        .bg-flower {
            position: absolute;
            user-select: none;
            pointer-events: none;
            opacity: 0.7;
            animation: floaty linear infinite;
        }

        @keyframes floaty {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(20deg); }
        }

        /* ENVELOPE CONTAINER */
        .container {
            position: relative;
            width: var(--env-width);
            max-width: var(--env-max-width);
            height: var(--env-height);
            cursor: pointer;
            z-index: 10;
        }

        /* LID */
        .lid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 0;
            /* Creates the triangle lid */
            border-left: calc(min(var(--env-width), var(--env-max-width)) / 2) solid transparent;
            border-right: calc(min(var(--env-width), var(--env-max-width)) / 2) solid transparent;
            border-top: 160px solid var(--env-lid);
            
            transform-origin: top;
            transition: transform 0.6s ease, z-index 0.2s;
            z-index: 5;
        }

        /* LETTER - Now same size as envelope */
        .letter {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            padding: 30px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.7s ease;
            z-index: 2;
            border-radius: 4px;
        }

        .letter h1 {
            color: #14245e;
            margin-bottom: 15px;
            font-size: clamp(1.2rem, 6vw, 1.8rem);
        }

        .letter p {
            color: #6b1230;
            font-size: clamp(0.9rem, 4.5vw, 1.2rem);
            line-height: 1.5;
        }

        .heart {
            margin-top: 15px;
            font-size: 2.5rem;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* ENVELOPE BODY */
        .front-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--env-main);
            /* This creates the "V" opening where the letter sits */
            clip-path: polygon(0 0, 0% 100%, 100% 100%, 100% 0, 50% 50%);
            z-index: 4;
        }

        /* OPEN STATE */
        .container.open .lid {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .container.open .letter {
            /* Slides up to reveal itself while staying aligned */
            transform: translateY(-180px);
            z-index: 10;
        }

    </style>
</head>

<body>

    <div id="flower-garden"></div>

    <div class="container" onclick="this.classList.toggle('open')">
        <div class="lid"></div>

        <div class="letter">
            <h1>🌸 Happy Mother's Day! 🌸</h1>
            <p>
                Thank you for your endless love, care,
                and kindness. You make the world
                brighter every single day!
            </p>
            <div class="heart">❤️</div>
        </div>

        <div class="front-panel"></div>
    </div>

    <script>
        const garden = document.getElementById("flower-garden");
        const flowers = ["🌸","🌺","🌷","🌼","💐","🪻","🌹","🌻"];
        const flowerCount = 80; 

        for (let i = 0; i < flowerCount; i++) {
            const flower = document.createElement("div");
            flower.className = "bg-flower";
            flower.innerText = flowers[Math.floor(Math.random() * flowers.length)];
            flower.style.left = Math.random() * 100 + "vw";
            flower.style.top = Math.random() * 100 + "vh";
            flower.style.fontSize = (Math.random() * 1.5 + 1) + "rem";
            flower.style.animationDuration = (Math.random() * 5 + 5) + "s";
            flower.style.animationDelay = (Math.random() * 5) + "s";
            flower.style.transform = `rotate(${Math.random() * 360}deg)`;
            garden.appendChild(flower);
        }
    </script>

</body>
</html>
